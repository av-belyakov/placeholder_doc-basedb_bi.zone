version: "3.4"

services:
  app:
    container_name: placeholder-doc-basedb-bi-zone.test
    environment:
      - GO_PHDOCBASEDBBZ_DBWLOGPASSWD=$DEV_PHDOCBASEDBBZ_DBWLOGPASSWD
      - GO_PHDOCBASEDBBZ_DBSTORAGEPASSWD=$DEV_PHDOCBASEDBBZ_DBSTORAGEPASSWD
    image: gitlab.cloud.gcm:5050/a.belyakov/placeholder-doc-basedb-bi-zone:test
    restart: unless-stopped
    #пробрасываем user ID для корректной записи в логов
    user: root
    command: chmod 777 /opt/placeholder-doc-basedb-bi-zone/logs && \
             chown 1500:1500 /opt/placeholder-doc-basedb-bi-zone/logs
    volumes:
      - /var/log/placeholder-doc-basedb-bi-zone.test:/opt/placeholder-doc-basedb-bi-zone/logs:rw
      - ./config:/opt/placeholder-doc-basedb-bi-zone/config:rw
      #выполняем для корректного отображения даты с учетом временной зоны
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    network_mode: "host"